<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ôn Từ Vựng Đa Năng</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f9f9f9;
        color: #333;
      }
      h2 {
        text-align: center;
        color: #2c3e50;
      }
      textarea {
        width: 100%;
        height: 100px;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        resize: vertical;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      .main-btn {
        flex: 1;
        padding: 12px;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        transition: 0.2s;
      }
      .btn-quiz {
        background-color: #3498db;
      }
      .btn-quiz:hover {
        background-color: #2980b9;
      }
      .btn-spell {
        background-color: #9b59b6;
      }
      .btn-spell:hover {
        background-color: #8e44ad;
      }

      #loading {
        display: none;
        color: #e67e22;
        font-weight: bold;
        text-align: center;
        margin-top: 15px;
      }
      .question-card {
        background: white;
        border: 1px solid #ddd;
        padding: 20px;
        margin-top: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .question-text {
        font-weight: bold;
        margin-bottom: 15px;
        color: #2c3e50;
        font-size: 18px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .option {
        padding: 12px;
        background: #f1f2f6;
        border: 1px solid #ced6e0;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
      }
      .option:hover {
        background: #dfe4ea;
      }
      .correct {
        background: #2ecc71 !important;
        color: white;
        border-color: #27ae60 !important;
        pointer-events: none;
      }
      .wrong {
        background: #e74c3c !important;
        color: white;
        border-color: #c0392b !important;
        pointer-events: none;
      }
      .disabled {
        pointer-events: none;
        opacity: 0.7;
      }

      .spell-group {
        display: flex;
        gap: 10px;
      }
      .spell-input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        outline: none;
      }
      .spell-btn {
        padding: 10px 20px;
        background-color: #2ecc71;
        color: white;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
      }
      .spell-btn:hover {
        background-color: #27ae60;
      }
      .result-msg {
        margin-top: 10px;
        font-size: 16px;
        font-weight: bold;
      }

      .speaker-btn {
        background-color: #f1f2f6;
        border: 1px solid #ccc;
        border-radius: 50px;
        padding: 5px 10px;
        cursor: pointer;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .speaker-btn:hover {
        background-color: #dfe4ea;
        transform: scale(1.05);
      }

      .stats-card {
        background: #fff3cd;
        border: 2px solid #ffc107;
        padding: 20px;
        margin-top: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        display: none;
      }
      .stats-title {
        font-size: 22px;
        font-weight: bold;
        color: #d35400;
        margin-bottom: 10px;
      }
      .score-text {
        font-size: 20px;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 15px;
      }
      .mistake-list {
        text-align: left;
        background: white;
        padding: 15px;
        border-radius: 5px;
        border: 1px solid #f1c40f;
      }
      .mistake-item {
        margin-bottom: 10px;
        border-bottom: 1px dashed #ccc;
        padding-bottom: 10px;
      }
      .mistake-item:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      @media (max-width: 400px) {
        .options-grid {
          grid-template-columns: 1fr;
        }
        .spell-group {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <h2>Ôn Tập Từ Vựng Đa Năng</h2>
    <p>
      Nhập từ tiếng Anh bên dưới.
      <b>Chỉ cần copy cột từ vựng dán vô ô dưới.</b>
    </p>
    <textarea
      id="wordInput"
      placeholder="Ví dụ:
get up
look forward to
give up 
take care of"
    ></textarea>

    <div class="btn-group">
      <button class="main-btn btn-quiz" id="btnQuiz" onclick="startApp('quiz')">
        📝 Trắc Nghiệm
      </button>
      <button
        class="main-btn btn-spell"
        id="btnSpell"
        onclick="startApp('spell')"
      >
        ⌨️ Viết Chính Tả
      </button>
    </div>

    <div id="loading">Đang xử lý dữ liệu, bạn đợi xíu nhé... ⏳</div>

    <div id="quizArea"></div>
    <div id="statsArea" class="stats-card"></div>

    <script>
      window.speechSynthesis.getVoices();

      function speakWord(word, accent) {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(word);
        let voices = window.speechSynthesis.getVoices();
        let targetVoice = voices.find((v) =>
          accent === "uk"
            ? v.lang === "en-GB" || v.lang === "en_GB"
            : v.lang === "en-US" || v.lang === "en_US",
        );
        if (targetVoice) utterance.voice = targetVoice;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }

      // Kho hơn 500 từ mồi siêu đa dạng
      const rawVocab =
        "quả táo, chạy bộ, bơi lội, thông minh, ngôi nhà, xinh đẹp, máy vi tính, bầu trời, hạnh phúc, công việc, buồn bã, chiếc xe, con mèo, uống nước, đọc sách, ngủ ngon, nấu ăn, đi du lịch, chăm chỉ, trường học, bóng đá, nghe nhạc, đồng hồ, nóng bức, lạnh lẽo, bệnh viện, cửa sổ, bài tập, thành công, tiền bạc, thức dậy, đi dạo, mua sắm, khóc lóc, cười to, tức giận, nhanh nhẹn, chậm chạp, mạnh mẽ, yếu đuối, ngon miệng, con chó, điện thoại, tivi, cái bàn, chiếc ghế, cửa ra vào, bức tranh, bóng rổ, quần vợt, cầu lông, áo sơ mi, quần dài, giày thể thao, mũ len, kính râm, bánh mì, cơm rang, phở bò, trà sữa, cà phê, nước ép, máy bay, tàu hỏa, xe buýt, xe đạp, đường phố, cây cối, hoa hồng, biển cả, núi non, dòng sông, mặt trời, mặt trăng, ngôi sao, mưa rơi, tuyết trắng, gió thổi, bão táp, mùa xuân, mùa hè, mùa thu, mùa đông, buổi sáng, buổi trưa, buổi tối, bạn bè, gia đình, bố mẹ, anh chị, thầy giáo, bác sĩ, cảnh sát, kỹ sư, nông dân, ca sĩ, diễn viên, vẽ tranh, chụp ảnh, nhảy múa, hát hò, nói chuyện, lắng nghe, viết thư, giải toán, lịch sử, địa lý, khoa học, nghệ thuật, sức khỏe, tương lai, quá khứ, hiện tại, tình yêu, hy vọng, niềm tin, sự thật, giả dối, nguy hiểm, an toàn, sạch sẽ, bẩn thỉu, ồn ào, yên tĩnh, đắt đỏ, rẻ tiền, dễ dàng, khó khăn, vui vẻ, thú vị, nhàm chán, mệt mỏi, khỏe mạnh, đói bụng, khát nước, sợ hãi, dũng cảm, ngạc nhiên, bí mật, chìa khóa, ví tiền, balo, sách vở, bút bi, thước kẻ, máy tính bảng, bàn phím, chuột máy tính, màn hình, pin dự phòng, tai nghe, bảo tàng, công viên, siêu thị, chợ, nhà hàng, quán cà phê, rạp chiếu phim, phòng gym, hồ bơi, sân bóng, sân bay, bến xe, nhà ga, khách sạn, bưu điện, ngân hàng, nhà thuốc, tiệm bánh, cắt tóc, trang điểm, quần áo, đồ trang sức, đồng hồ đeo tay, nước hoa, giày cao gót, dép lê, bình nước, cái bát, đôi đũa, cái thìa, cái nĩa, con dao, cái thớt, nồi cơm điện, lò vi sóng, tủ lạnh, máy giặt, máy lạnh, nhiệt kế, thuốc lá, cái chai, con sư tử, con hổ, con voi, con khỉ, con rắn, chim cánh cụt, cá heo, cá mập, đại bàng, rừng rậm, sa mạc, vũ trụ, phi hành gia, tàu vũ trụ, người ngoài hành tinh, ma thuật, kiếm sĩ, rồng, lâu đài, phù thủy, siêu anh hùng, quái vật, phép thuật, chiến tranh, hòa bình, quân đội, vũ khí, súng ống, bom mìn, chiến hạm, xe tăng, trực thăng, cứu hỏa, xe cứu thương, tai nạn, thảm họa, động đất, sóng thần, núi lửa, lốc xoáy, hạn hán, lũ lụt, ô nhiễm, rác thải, tái chế, bảo vệ, tiêu diệt, xây dựng, phá hủy, sáng tạo, phát minh, khám phá, tìm kiếm, giấu giếm, trộm cắp, cảnh giác, ngủ gật, mơ mộng, tỉnh táo, say xỉn, thuốc men, phẫu thuật, nha sĩ, nhổ răng, đau đầu, đau bụng, sổ mũi, ho, sốt, vi khuẩn, virus, kháng sinh, tiêm phòng, vắc xin, nhà khoa học, phòng thí nghiệm, kính hiển vi, ống nghiệm, hóa chất, vật lý, sinh học, toán học, văn học, thơ ca, tiểu thuyết, truyện tranh, báo chí, tạp chí, tin tức, phỏng vấn, nhà báo, nhiếp ảnh gia, đạo diễn, kịch bản, sân khấu, ánh sáng, âm thanh, micro, loa, đàn guitar, đàn piano, trống, sáo, nhạc cổ điển, nhạc pop, nhạc rock, nhạc rap, khiêu vũ, múa bale, võ thuật, karate, judo, taekwondo, quyền anh, bơi nghệ thuật, trượt băng, trượt tuyết, leo núi, cắm trại, câu cá, săn bắn, hái lượm, nông trại, trồng trọt, chăn nuôi, thu hoạch, cày cấy, máy kéo, phân bón, hạt giống, tưới nước, ánh sáng mặt trời, bóng râm, buổi hoàng hôn, buổi bình minh, sương mù, mây đen, sấm sét, cầu vồng, bãi biển, cát trắng, vỏ sò, san hô, hải cẩu, rùa biển, tôm hùm, cua hoàng đế, mực ống, bạch tuộc, ngọc trai, kho báu, hải tặc, la bàn, bản đồ, thám hiểm, rừng nhiệt đới, cây cổ thụ, dây leo, hoa lan, hoa cúc, hoa mai, hoa đào, hoa sen, lá cây, cành cây, rễ cây, quả chuối, quả cam, quả xoài, quả dưa hấu, quả nho, dâu tây, việt quất, quả dứa, quả dừa, quả chanh, quả ớt, hành tây, tỏi, gừng, khoai tây, cà chua, cà rốt, bắp cải, rau muống, nấm, thịt heo, thịt gà, thịt bò, cá nướng, tôm luộc, lẩu thái, bún chả, nem rán, bánh cuốn, bánh xèo, gỏi cuốn, nước mắm, tương ớt, muối tiêu, đường, bột ngọt, dầu ăn, giấm, mật ong, bơ, pho mát, sữa chua, kem, sô cô la, kẹo mút, bánh quy, bánh kem, sinh nhật, đám cưới, lễ hội, năm mới, giáng sinh, halloween, trung thu, quà tặng, bóng bay, pháo hoa, nến, nhẫn cưới, váy cưới, comple, cravat, giày da, tất, quần lót, áo lót, đồ bơi, áo khoác, áo mưa, ô dù, găng tay, khăn quàng cổ, nón lá, túi xách, vali, hộ chiếu, visa, vé máy bay, hành lý, hải quan, tiếp viên hàng không, phi công, buồng lái, cánh quạt, động cơ, lốp xe, vô lăng, phanh xe, còi xe, biển báo, đèn giao thông, ngã tư, vỉa hè, cầu vượt, hầm chui, đường cao tốc, biển số xe, bằng lái xe, phạt nguội, kẹt xe, tai nạn giao thông, bảo hiểm, thuế, ngân sách, lương, thưởng, thăng chức, sa thải, phỏng vấn xin việc, hồ sơ, đồng nghiệp, sếp, khách hàng, hợp đồng, lợi nhuận, thua lỗ, phá sản, đầu tư, cổ phiếu, chứng khoán, tiền điện tử, bất động sản, vay vốn, trả nợ, tiết kiệm, ATM, thẻ tín dụng, chuyển khoản, mật khẩu, tài khoản, đăng nhập, đăng xuất, tải xuống, tải lên, cài đặt, xóa bỏ, cập nhật, phần mềm, phần cứng, trí tuệ nhân tạo, robot, thực tế ảo, mạng xã hội, tin nhắn, bình luận, chia sẻ, thích, theo dõi";
      const dummyDistractors = rawVocab.split(", ");

      let totalQuestions = 0;
      let answeredQuestions = 0;
      let correctAnswers = 0;
      let mistakes = [];

      async function startApp(mode) {
        const input = document.getElementById("wordInput").value;
        const loading = document.getElementById("loading");
        const quizArea = document.getElementById("quizArea");
        const statsArea = document.getElementById("statsArea");
        const btnQuiz = document.getElementById("btnQuiz");
        const btnSpell = document.getElementById("btnSpell");

        let words = input
          .split(/[\n,]+/)
          .map((w) => w.trim())
          .filter((w) => w !== "");

        if (words.length === 0) {
          alert("Vui lòng nhập ít nhất 1 từ!");
          return;
        }

        loading.style.display = "block";
        quizArea.innerHTML = "";
        statsArea.style.display = "none";
        statsArea.innerHTML = "";
        btnQuiz.disabled = true;
        btnSpell.disabled = true;

        let validData = [];
        for (let word of words) {
          try {
            let url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(word)}`;
            let response = await fetch(url);
            if (response.ok) {
              let data = await response.json();
              let translatedWord = data[0][0][0];
              if (
                translatedWord &&
                translatedWord.toLowerCase() !== word.toLowerCase()
              ) {
                validData.push({
                  word: word.toLowerCase(),
                  definition: translatedWord,
                });
              }
            }
          } catch (error) {
            console.log(`Lỗi khi dịch từ: ${word}`);
          }
        }

        loading.style.display = "none";
        btnQuiz.disabled = false;
        btnSpell.disabled = false;

        if (validData.length === 0) {
          alert("Không thể dịch các từ bạn đã nhập. Vui lòng thử lại!");
          return;
        }

        // --- ĐÂY CHÍNH LÀ ĐOẠN XÁO TRỘN CÂU HỎI ---
        // Nó sẽ xáo trộn ngay từ ban đầu cho toàn bộ validData
        validData = validData.sort(() => 0.5 - Math.random());

        totalQuestions = validData.length;
        answeredQuestions = 0;
        correctAnswers = 0;
        mistakes = [];

        const checkCompletion = () => {
          if (answeredQuestions === totalQuestions) {
            showStatistics(mode);
          }
        };

        if (mode === "quiz") {
          const prefixLetters = ["A", "B", "C", "D"];
          validData.forEach((item, index) => {
            let otherValidDefinitions = validData
              .filter((v) => v.word !== item.word)
              .map((v) => v.definition);
            let combinedDistractors = [
              ...otherValidDefinitions,
              ...dummyDistractors,
            ];
            let uniqueSafeDistractors = [
              ...new Set(combinedDistractors),
            ].filter((d) => d.toLowerCase() !== item.definition.toLowerCase());

            let wrongOptionsRaw = uniqueSafeDistractors
              .sort(() => 0.5 - Math.random())
              .slice(0, 3);
            let wrongOptions = wrongOptionsRaw.map((d) => ({ definition: d }));

            let options = [item, ...wrongOptions].sort(
              () => 0.5 - Math.random(),
            );

            let questionDiv = document.createElement("div");
            questionDiv.className = "question-card";

            questionDiv.innerHTML = `
                        <div class="question-text">
                            <span>Câu ${index + 1}: <b>"${item.word}"</b> có nghĩa là gì?</span>
                            <button class="speaker-btn" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'uk')">🇬🇧 🔊</button>
                            <button class="speaker-btn" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'us')">🇺🇸 🔊</button>
                        </div>
                        <div class="options-grid"></div>
                    `;

            let grid = questionDiv.querySelector(".options-grid");
            options.forEach((opt, optIndex) => {
              let optDiv = document.createElement("div");
              optDiv.className = "option";
              optDiv.innerText = `${prefixLetters[optIndex]}: ${opt.definition}`;

              optDiv.onclick = function () {
                if (optDiv.classList.contains("disabled")) return;

                let allOptions = questionDiv.querySelectorAll(".option");
                allOptions.forEach((el) => el.classList.add("disabled"));

                answeredQuestions++;

                if (opt.definition === item.definition) {
                  optDiv.classList.add("correct");
                  correctAnswers++;
                } else {
                  optDiv.classList.add("wrong");
                  allOptions.forEach((el) => {
                    if (el.innerText.includes(item.definition))
                      el.classList.add("correct");
                  });

                  mistakes.push({
                    question: `Từ "${item.word}"`,
                    correct: item.definition,
                    userAnswer: opt.definition,
                  });
                }
                checkCompletion();
              };
              grid.appendChild(optDiv);
            });
            quizArea.appendChild(questionDiv);
          });
        } else if (mode === "spell") {
          // Đã bỏ biến shuffledData vì validData đã được xáo trộn từ trên
          validData.forEach((item, index) => {
            let questionDiv = document.createElement("div");
            questionDiv.className = "question-card";

            questionDiv.innerHTML = `
                        <div class="question-text">Câu ${index + 1}: Từ nào có nghĩa là <b>"${item.definition}"</b>?</div>
                        <div class="spell-group">
                            <input type="text" class="spell-input" placeholder="Gõ từ tiếng Anh vào đây...">
                            <button class="spell-btn">Kiểm tra</button>
                        </div>
                        <div class="result-msg"></div>
                        <div class="speaker-group" style="display: none; margin-top: 10px;">
                            <button class="speaker-btn" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'uk')">🇬🇧 Nghe lại</button>
                            <button class="speaker-btn" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'us')">🇺🇸 Nghe lại</button>
                        </div>
                    `;

            let inputField = questionDiv.querySelector(".spell-input");
            let checkBtn = questionDiv.querySelector(".spell-btn");
            let msg = questionDiv.querySelector(".result-msg");
            let speakerGroup = questionDiv.querySelector(".speaker-group");

            const checkAnswer = () => {
              let userWord = inputField.value.trim().toLowerCase();
              if (!userWord) return;

              inputField.disabled = true;
              checkBtn.disabled = true;
              speakerGroup.style.display = "block";

              answeredQuestions++;

              if (userWord === item.word) {
                msg.innerText = "🎉 Chính xác!";
                msg.style.color = "#2ecc71";
                inputField.style.borderColor = "#2ecc71";
                inputField.style.backgroundColor = "#eafaf1";
                correctAnswers++;
              } else {
                msg.innerHTML = `❌ Sai rồi! Đáp án đúng là: <b>${item.word}</b>`;
                msg.style.color = "#e74c3c";
                inputField.style.borderColor = "#e74c3c";
                inputField.style.backgroundColor = "#fdedec";

                mistakes.push({
                  question: `Nghĩa là "${item.definition}"`,
                  correct: item.word,
                  userAnswer: userWord,
                });
              }
              checkCompletion();
            };

            checkBtn.onclick = checkAnswer;
            inputField.addEventListener("keypress", function (event) {
              if (event.key === "Enter") {
                event.preventDefault();
                checkAnswer();
              }
            });

            quizArea.appendChild(questionDiv);
          });
        }
      }

      function showStatistics(mode) {
        const statsArea = document.getElementById("statsArea");
        statsArea.style.display = "block";

        let percent = Math.round((correctAnswers / totalQuestions) * 100);
        let feedback =
          percent === 100
            ? "Tuyệt đỉnh! Bạn không sai câu nào. 🏆"
            : percent >= 70
              ? "Rất tốt! Cố gắng thêm một chút nữa nhé. 👍"
              : "Cần ôn tập nhiều hơn nha! Đừng nản chí. 💪";

        let html = `
                <div class="stats-title">📊 HOÀN THÀNH BÀI TẬP!</div>
                <div class="score-text">Đúng: ${correctAnswers} / ${totalQuestions} câu (${percent}%)</div>
                <p style="margin-bottom: 15px; color: #7f8c8d;">${feedback}</p>
            `;

        if (mistakes.length > 0) {
          html += `<div class="mistake-list"><strong>⚠️ Những câu bạn làm sai:</strong><br><br>`;
          mistakes.forEach((err) => {
            html += `
                        <div class="mistake-item">
                            - <b>${err.question}</b><br>
                            <span style="color: red;">❌ Bạn chọn/gõ: ${err.userAnswer}</span><br>
                            <span style="color: green;">✅ Đáp án đúng: ${err.correct}</span>
                        </div>
                    `;
          });
          html += `</div>`;
        }

        html += `<br><button class="main-btn btn-quiz" onclick="window.scrollTo(0,0)">Làm bài khác</button>`;
        statsArea.innerHTML = html;

        setTimeout(() => {
          statsArea.scrollIntoView({ behavior: "smooth" });
        }, 500);
      }
    </script>
  </body>
</html>
