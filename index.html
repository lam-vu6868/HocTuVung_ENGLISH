<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💡 Ôn Từ Vựng Đa Năng - UX Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
      :root {
        --primary: #3498db;
        --primary-dark: #2980b9;
        --secondary: #f39c12;
        --secondary-dark: #d35400;
        --success: #2ecc71;
        --success-dark: #27ae60;
        --danger: #e74c3c;
        --danger-dark: #c0392b;
        --purple: #9b59b6;
        --purple-dark: #8e44ad;
        --bg-color: #f0f4f8;
        --text-color: #2c3e50;
      }

      body {
        font-family: "Nunito", sans-serif;
        max-width: 650px;
        margin: 0 auto;
        padding: 20px;
        background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        color: var(--text-color);
        min-height: 100vh;
      }

      h2 {
        text-align: center;
        font-size: 28px;
        font-weight: 800;
        color: var(--primary-dark);
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        margin-bottom: 5px;
      }

      p.subtitle {
        text-align: center;
        color: #7f8c8d;
        font-weight: 600;
        margin-bottom: 20px;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 15px;
        box-sizing: border-box;
        border: 2px solid #e0e6ed;
        border-radius: 15px;
        font-size: 16px;
        font-family: "Nunito", sans-serif;
        resize: vertical;
        transition: border-color 0.3s;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
      }

      textarea:focus {
        outline: none;
        border-color: var(--primary);
      }

      /* Nút bấm 3D kiểu Duolingo */
      .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 15px;
        flex-wrap: wrap;
      }

      .main-btn {
        flex: 1;
        min-width: 120px;
        padding: 14px;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.1s;
        position: relative;
        top: 0;
      }

      .main-btn:active:not(:disabled) {
        top: 4px;
        box-shadow: 0 0px 0 transparent !important;
      }

      .btn-flashcard {
        background-color: var(--secondary);
        box-shadow: 0 4px 0 var(--secondary-dark);
      }
      .btn-quiz {
        background-color: var(--primary);
        box-shadow: 0 4px 0 var(--primary-dark);
      }
      .btn-spell {
        background-color: var(--purple);
        box-shadow: 0 4px 0 var(--purple-dark);
      }

      .main-btn:disabled {
        background-color: #bdc3c7;
        box-shadow: 0 4px 0 #95a5a6;
        cursor: not-allowed;
        top: 0;
      }

      /* Animation Loading */
      #loading {
        display: none;
        color: var(--secondary);
        font-weight: 700;
        text-align: center;
        margin-top: 20px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 0.6;
          transform: scale(0.98);
        }
        50% {
          opacity: 1;
          transform: scale(1.02);
        }
        100% {
          opacity: 0.6;
          transform: scale(0.98);
        }
      }

      /* Thanh Tiến Trình */
      .progress-container {
        position: sticky;
        top: 0;
        background: rgba(253, 251, 251, 0.9);
        backdrop-filter: blur(5px);
        padding: 15px 0;
        z-index: 999;
        display: none;
      }
      .progress-bar-bg {
        width: 100%;
        background-color: #e0e6ed;
        height: 12px;
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background-color: var(--success);
        border-radius: 10px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }

      /* Hoạt ảnh xuất hiện thẻ */
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Hoạt ảnh rung lắc khi sai */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-5px);
        }
        40%,
        80% {
          transform: translateX(5px);
        }
      }
      .shake {
        animation: shake 0.4s ease-in-out;
      }

      /* CSS Flashcard */
      .flashcard-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 15px;
        animation: slideInUp 0.5s ease-out;
      }
      .flip-card {
        background-color: transparent;
        width: 100%;
        max-width: 450px;
        height: 280px;
        perspective: 1000px;
        cursor: pointer;
      }
      .flip-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
      .flip-card.flipped .flip-card-inner {
        transform: rotateY(180deg);
      }
      .flip-card-front,
      .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 20px;
        padding: 20px;
        box-sizing: border-box;
      }
      .flip-card-front {
        background-color: #ffffff;
        color: var(--text-color);
        border: 3px solid var(--secondary);
      }
      .flip-card-back {
        background: linear-gradient(
          135deg,
          var(--secondary) 0%,
          var(--secondary-dark) 100%
        );
        color: white;
        transform: rotateY(180deg);
        border: 3px solid var(--secondary-dark);
      }
      .fc-word {
        font-size: 38px;
        font-weight: 800;
        margin-bottom: 5px;
        color: var(--secondary-dark);
        word-break: break-word;
      }
      .fc-ipa {
        font-size: 22px;
        color: #95a5a6;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      .fc-def {
        font-size: 32px;
        font-weight: 800;
      }

      /* Câu hỏi trắc nghiệm */
      .question-card {
        background: white;
        border: 2px solid #e0e6ed;
        padding: 25px;
        margin-top: 25px;
        border-radius: 15px;
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
        animation: slideInUp 0.5s ease-out;
        transition: border-color 0.3s;
      }
      .question-text {
        font-weight: 700;
        margin-bottom: 20px;
        font-size: 20px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }
      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .option {
        padding: 15px;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        cursor: pointer;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .option:hover:not(.disabled) {
        background: #edf2f7;
        border-color: #cbd5e0;
        transform: translateY(-2px);
      }
      .correct {
        background: #eafaf1 !important;
        color: var(--success-dark);
        border-color: var(--success) !important;
        pointer-events: none;
        box-shadow: 0 4px 0 var(--success-dark);
        transform: translateY(-2px);
      }
      .wrong {
        background: #fdedec !important;
        color: var(--danger-dark);
        border-color: var(--danger) !important;
        pointer-events: none;
        box-shadow: 0 4px 0 var(--danger-dark);
        transform: translateY(-2px);
      }

      .explanation-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 12px;
        font-size: 16px;
        display: none;
        animation: slideInUp 0.3s ease-out;
        line-height: 1.6;
      }

      /* Chính tả */
      .spell-input {
        flex: 1;
        padding: 15px;
        border: 2px solid #e0e6ed;
        border-radius: 12px;
        font-size: 18px;
        font-family: "Nunito", sans-serif;
        font-weight: 600;
        outline: none;
        transition: 0.3s;
      }
      .spell-input:focus {
        border-color: var(--purple);
      }
      .spell-btn {
        padding: 15px 25px;
        background-color: var(--success);
        box-shadow: 0 4px 0 var(--success-dark);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.1s;
        position: relative;
        top: 0;
      }
      .spell-btn:active:not(:disabled) {
        top: 4px;
        box-shadow: 0 0px 0 transparent !important;
      }

      .speaker-btn {
        background-color: white;
        border: 2px solid #e2e8f0;
        border-radius: 50px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
        color: #4a5568;
      }
      .speaker-btn:hover {
        background-color: #edf2f7;
        transform: scale(1.05);
      }

      /* Bảng thống kê */
      .stats-card {
        background: white;
        border: 3px solid #f1c40f;
        padding: 30px;
        margin-top: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(241, 196, 15, 0.2);
        text-align: center;
        display: none;
        animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .stats-title {
        font-size: 26px;
        font-weight: 800;
        color: var(--secondary-dark);
        margin-bottom: 15px;
      }

      @media (max-width: 480px) {
        .options-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="inputSection">
      <h2>✨ Ôn Tập Từ Vựng Pro</h2>
      <p class="subtitle">
        Nhập từ vựng để bắt đầu trải nghiệm học tập tuyệt vời!
      </p>
      <textarea
        id="wordInput"
        placeholder="Nhập từ vựng ở đây nhé...&#10;Ví dụ:&#10;apple&#10;beautiful&#10;get up"
      ></textarea>

      <div class="btn-group">
        <button
          class="main-btn btn-flashcard"
          id="btnFlashcard"
          onclick="startApp('flashcard')"
        >
          🗂️ Lật Thẻ
        </button>
        <button
          class="main-btn btn-quiz"
          id="btnQuiz"
          onclick="startApp('quiz')"
        >
          📝 Trắc Nghiệm
        </button>
        <button
          class="main-btn btn-spell"
          id="btnSpell"
          onclick="startApp('spell')"
        >
          ⌨️ Gõ Từ
        </button>
      </div>
    </div>

    <div id="loading">Đang chuẩn bị bài học siêu hay cho bạn... 🚀</div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div id="quizArea"></div>
    <div id="statsArea" class="stats-card"></div>

    <script>
      window.speechSynthesis.getVoices();

      function speakWord(word, accent) {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(word);
        let voices = window.speechSynthesis.getVoices();
        let targetVoice = voices.find((v) =>
          accent === "uk"
            ? v.lang === "en-GB" || v.lang === "en_GB"
            : v.lang === "en-US" || v.lang === "en_US",
        );
        if (targetVoice) utterance.voice = targetVoice;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }

      async function fetchSingleWordIpa(singleWord) {
        try {
          let resDict = await fetch(
            `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(singleWord)}`,
          );
          if (resDict.ok) {
            let dictData = await resDict.json();
            let phonetics = dictData[0]?.phonetics || [];
            let broadIPA = phonetics.find(
              (p) => p.text && p.text.includes("/"),
            );
            if (broadIPA) return broadIPA.text;
            let validP = phonetics.find((p) => p.text);
            if (validP) return validP.text;
            if (dictData[0]?.phonetic) return dictData[0].phonetic;
          }
        } catch (e) {}
        return "";
      }

      const dummyDistractors = [
        { word: "apple", definition: "quả táo", ipa: "/ˈæp.əl/" },
        { word: "jog", definition: "chạy bộ", ipa: "/dʒɒɡ/" },
        { word: "swim", definition: "bơi lội", ipa: "/swɪm/" },
        { word: "smart", definition: "thông minh", ipa: "/smɑːt/" },
        { word: "house", definition: "ngôi nhà", ipa: "/haʊs/" },
        { word: "beautiful", definition: "xinh đẹp", ipa: "/ˈbjuː.tɪ.fəl/" },
        { word: "computer", definition: "máy tính", ipa: "/kəmˈpjuː.tə(r)/" },
        { word: "sky", definition: "bầu trời", ipa: "/skaɪ/" },
        { word: "happy", definition: "hạnh phúc", ipa: "/ˈhæp.i/" },
        { word: "work", definition: "công việc", ipa: "/wɜːk/" },
      ];

      let totalQuestions = 0;
      let answeredQuestions = 0;
      let correctAnswers = 0;
      let mistakes = [];
      let flashcardData = [];
      let currentCardIndex = 0;

      // Hàm quay lại giao diện nhập từ ban đầu
      window.goBackToInput = () => {
        document.getElementById("inputSection").style.display = "block";
        document.getElementById("quizArea").innerHTML = "";
        document.getElementById("statsArea").style.display = "none";
        document.getElementById("progressContainer").style.display = "none";
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      async function startApp(mode) {
        const input = document.getElementById("wordInput").value;
        const loading = document.getElementById("loading");
        const quizArea = document.getElementById("quizArea");
        const statsArea = document.getElementById("statsArea");
        const btns = document.querySelectorAll(".main-btn");
        const progressContainer = document.getElementById("progressContainer");
        const progressBar = document.getElementById("progressBar");
        const inputSection = document.getElementById("inputSection");

        let words = [
          ...new Set(
            input
              .split(/[,\n\r]+/)
              .map((w) => w.trim())
              .filter((w) => w !== ""),
          ),
        ];

        if (words.length === 0) {
          alert("Oops! Bạn quên nhập từ vựng rồi kìa!");
          return;
        }

        loading.style.display = "block";
        quizArea.innerHTML = "";
        statsArea.style.display = "none";
        btns.forEach((btn) => (btn.disabled = true));

        progressBar.style.width = "0%";
        progressContainer.style.display =
          mode === "quiz" || mode === "spell" ? "block" : "none";

        let validData = [];
        for (let word of words) {
          try {
            let resTranslate = await fetch(
              `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(word)}`,
            );
            let translatedWord = word;
            if (resTranslate.ok) {
              let data = await resTranslate.json();
              translatedWord = data[0][0][0];
            }

            let ipa = "";
            let subWords = word.split(/\s+/).filter((w) => w !== "");
            if (subWords.length > 1) {
              let ipaParts = [];
              for (let subWord of subWords) {
                let cleanSub = subWord.replace(/[^a-zA-Z]/g, "");
                if (cleanSub) {
                  let subIpa = await fetchSingleWordIpa(cleanSub);
                  ipaParts.push(
                    subIpa
                      ? subIpa.replace(/[\/\[\]]/g, "")
                      : cleanSub.toLowerCase(),
                  );
                }
              }
              if (ipaParts.length > 0) ipa = "/" + ipaParts.join(" ") + "/";
            } else {
              let singleIpa = await fetchSingleWordIpa(word);
              if (singleIpa)
                ipa = singleIpa.startsWith("[")
                  ? "/" + singleIpa.slice(1, -1) + "/"
                  : singleIpa;
            }

            if (translatedWord.toLowerCase() !== word.toLowerCase()) {
              validData.push({ word, definition: translatedWord, ipa });
            }
          } catch (error) {}
        }

        loading.style.display = "none";
        btns.forEach((btn) => (btn.disabled = false));

        if (validData.length === 0) {
          alert("Không thể dịch các từ bạn đã nhập. Thử lại nhé!");
          progressContainer.style.display = "none";
          return;
        }

        // ẨN KHỐI NHẬP LIỆU KHI DỮ LIỆU ĐÃ HỢP LỆ VÀ SẴN SÀNG HỌC
        inputSection.style.display = "none";

        validData = validData.sort(() => 0.5 - Math.random());

        // Tạo nút Quay lại dùng chung cho các chế độ học
        let backBtnHtml = `<button class="speaker-btn" onclick="goBackToInput()" style="margin-bottom: 10px; border-color:var(--primary); color:var(--primary-dark);">⬅️ Nhập từ mới / Chọn chế độ khác</button>`;

        if (mode === "flashcard") {
          flashcardData = validData;
          currentCardIndex = 0;
          renderFlashcard();
        } else {
          totalQuestions = validData.length;
          answeredQuestions = 0;
          correctAnswers = 0;
          mistakes = [];

          // Chèn nút quay lại lên trên cùng khu vực làm bài
          let navDiv = document.createElement("div");
          navDiv.innerHTML = backBtnHtml;
          quizArea.appendChild(navDiv);

          const updateProgress = () => {
            progressBar.style.width = `${(answeredQuestions / totalQuestions) * 100}%`;
            if (answeredQuestions === totalQuestions)
              setTimeout(() => showStatistics(mode), 600);
          };

          if (mode === "quiz") {
            const prefixLetters = ["A", "B", "C", "D"];
            validData.forEach((item, index) => {
              let pool = [...validData, ...dummyDistractors].filter(
                (x) =>
                  x.definition.toLowerCase() !== item.definition.toLowerCase(),
              );
              let uniquePool = [];
              let seenDefs = new Set();
              pool.forEach((x) => {
                if (!seenDefs.has(x.definition.toLowerCase())) {
                  seenDefs.add(x.definition.toLowerCase());
                  uniquePool.push(x);
                }
              });

              let wrongOptions = uniquePool
                .sort(() => 0.5 - Math.random())
                .slice(0, 3);
              let options = [item, ...wrongOptions].sort(
                () => 0.5 - Math.random(),
              );

              let questionDiv = document.createElement("div");
              questionDiv.className = "question-card";
              questionDiv.innerHTML = `
                <div class="question-text">
                  <span>${index + 1}. <b>"${item.word}"</b> có nghĩa là gì?</span>
                  <button class="speaker-btn" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'uk')">🇬🇧</button>
                  <button class="speaker-btn" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'us')">🇺🇸</button>
                </div>
                <div class="options-grid"></div>
                <div class="explanation-box"></div>
              `;

              let grid = questionDiv.querySelector(".options-grid");
              let explanationDiv =
                questionDiv.querySelector(".explanation-box");

              options.forEach((opt, optIndex) => {
                let optDiv = document.createElement("div");
                optDiv.className = "option";
                optDiv.innerText = `${prefixLetters[optIndex]}. ${opt.definition}`;

                optDiv.onclick = function () {
                  if (optDiv.classList.contains("disabled")) return;
                  questionDiv
                    .querySelectorAll(".option")
                    .forEach((el) => el.classList.add("disabled"));
                  answeredQuestions++;
                  explanationDiv.style.display = "block";

                  let itemIpaDisplay = item.ipa
                    ? `<span style="color:#7f8c8d; font-weight:600; font-size:15px; margin-left:5px;">${item.ipa}</span>`
                    : "";
                  let optIpaDisplay = opt.ipa
                    ? `<span style="color:#7f8c8d; font-weight:600; font-size:15px; margin-left:5px;">${opt.ipa}</span>`
                    : "";

                  if (opt.definition === item.definition) {
                    optDiv.classList.add("correct");
                    correctAnswers++;
                    explanationDiv.innerHTML = `🎉 <b>Chính xác!</b> Từ <b>"${item.word}"</b> ${itemIpaDisplay} có nghĩa là <b>"${item.definition}"</b>.`;
                    explanationDiv.style.background = "#eafaf1";
                    explanationDiv.style.color = "var(--success-dark)";
                  } else {
                    optDiv.classList.add("wrong");
                    questionDiv.classList.add("shake");
                    questionDiv.style.borderColor = "var(--danger)";
                    questionDiv.querySelectorAll(".option").forEach((el) => {
                      if (el.innerText.includes(item.definition))
                        el.classList.add("correct");
                    });

                    mistakes.push({
                      word: item.word,
                      question: `Từ "${item.word}"`,
                      correct: item.definition,
                      userAnswer: opt.definition,
                      wrongWord: opt.word,
                      wrongIpa: opt.ipa,
                    });

                    explanationDiv.innerHTML = `
                      ❌ <b>Tiếc quá, chưa chính xác rồi!</b><br>
                      • Câu hỏi: Từ <b>"${item.word}"</b> ${itemIpaDisplay} mang nghĩa đúng là <b style="color:var(--success-dark);">"${item.definition}"</b>.<br>
                      • Bạn đã chọn nhầm: Nghĩa <b>"${opt.definition}"</b> thực chất là của từ tiếng Anh <b style="color:var(--danger-dark); font-size:18px;">"${opt.word}"</b> ${optIpaDisplay}.
                    `;
                    explanationDiv.style.background = "#fdedec";
                    explanationDiv.style.color = "var(--danger-dark)";
                  }
                  updateProgress();
                };
                grid.appendChild(optDiv);
              });
              quizArea.appendChild(questionDiv);
            });
          } else if (mode === "spell") {
            validData.forEach((item, index) => {
              let questionDiv = document.createElement("div");
              questionDiv.className = "question-card";
              questionDiv.innerHTML = `
                <div class="question-text">${index + 1}. Từ nào có nghĩa là <b>"${item.definition}"</b>?</div>
                <div style="display:flex; gap:10px;">
                  <input type="text" class="spell-input" placeholder="Gõ từ vào đây...">
                  <button class="spell-btn">Kiểm tra</button>
                </div>
                <div class="explanation-box"></div>
              `;

              let inputField = questionDiv.querySelector(".spell-input");
              let checkBtn = questionDiv.querySelector(".spell-btn");
              let explanationDiv =
                questionDiv.querySelector(".explanation-box");

              const checkAnswer = () => {
                let userWord = inputField.value.trim().toLowerCase();
                if (!userWord) return;
                inputField.disabled = true;
                checkBtn.disabled = true;
                answeredQuestions++;
                explanationDiv.style.display = "block";

                if (userWord === item.word.toLowerCase()) {
                  correctAnswers++;
                  inputField.style.borderColor = "var(--success)";
                  inputField.style.background = "#eafaf1";
                  explanationDiv.innerHTML = `🎉 <b>Xuất sắc!</b><br><button class="speaker-btn" style="margin-top:10px" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'us')">🔊 Nghe phát âm</button>`;
                  explanationDiv.style.background = "#eafaf1";
                  explanationDiv.style.color = "var(--success-dark)";
                } else {
                  questionDiv.classList.add("shake");
                  questionDiv.style.borderColor = "var(--danger)";
                  inputField.style.borderColor = "var(--danger)";
                  inputField.style.background = "#fdedec";
                  mistakes.push({
                    word: item.word,
                    question: `Nghĩa là "${item.definition}"`,
                    correct: item.word,
                    userAnswer: userWord,
                  });
                  explanationDiv.innerHTML = `❌ <b>Chưa đúng!</b> Đáp án đúng là: <b>${item.word}</b><br><button class="speaker-btn" style="margin-top:10px" onclick="speakWord('${item.word.replace(/'/g, "\\'")}', 'us')">🔊 Nghe cách phát âm</button>`;
                  explanationDiv.style.background = "#fdedec";
                  explanationDiv.style.color = "var(--danger-dark)";
                }
                updateProgress();
              };

              checkBtn.onclick = checkAnswer;
              inputField.addEventListener("keypress", (e) => {
                if (e.key === "Enter") checkAnswer();
              });
              quizArea.appendChild(questionDiv);
            });
          }
        }
      }

      function renderFlashcard() {
        const quizArea = document.getElementById("quizArea");
        let item = flashcardData[currentCardIndex];
        quizArea.innerHTML = `
          <div class="flashcard-wrapper">
            <button class="speaker-btn" onclick="goBackToInput()" style="margin-bottom: 20px; border-color:var(--primary); color:var(--primary-dark);">⬅️ Nhập từ mới / Chọn chế độ khác</button>
            <p style="color: #7f8c8d; font-weight: 600; margin-bottom: 10px;">✨ Chạm vào thẻ để lật</p>
            <div class="flip-card" onclick="this.classList.toggle('flipped')">
              <div class="flip-card-inner">
                <div class="flip-card-front">
                  <div class="fc-word">${item.word}</div>
                  <div class="fc-ipa">${item.ipa || "/.../"}</div>
                  <div style="display:flex; gap:15px; margin-top:10px;">
                    <button class="speaker-btn" onclick="event.stopPropagation(); speakWord('${item.word.replace(/'/g, "\\'")}', 'uk')">🇬🇧 UK</button>
                    <button class="speaker-btn" onclick="event.stopPropagation(); speakWord('${item.word.replace(/'/g, "\\'")}', 'us')">🇺🇸 US</button>
                  </div>
                </div>
                <div class="flip-card-back">
                  <div class="fc-def">${item.definition}</div>
                </div>
              </div>
            </div>
            <div style="display:flex; align-items:center; gap:20px; margin-top:30px;">
              <button class="speaker-btn" onclick="prevCard()" ${currentCardIndex === 0 ? "disabled" : ""}>⬅️ Trước</button>
              <span style="font-weight:800; font-size:18px; color:var(--text-color)">${currentCardIndex + 1} / ${flashcardData.length}</span>
              <button class="speaker-btn" onclick="nextCard()" ${currentCardIndex === flashcardData.length - 1 ? "disabled" : ""}>Sau ➡️</button>
            </div>
          </div>
        `;
      }

      window.prevCard = () => {
        if (currentCardIndex > 0) {
          currentCardIndex--;
          renderFlashcard();
        }
      };
      window.nextCard = () => {
        if (currentCardIndex < flashcardData.length - 1) {
          currentCardIndex++;
          renderFlashcard();
        }
      };

      function showStatistics(mode) {
        document.getElementById("progressContainer").style.display = "none";
        const statsArea = document.getElementById("statsArea");
        statsArea.style.display = "block";

        let percent = Math.round((correctAnswers / totalQuestions) * 100);

        if (percent === 100) {
          confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        }

        let feedback =
          percent === 100
            ? "Tuyệt đỉnh! Không chê vào đâu được! 🏆"
            : percent >= 70
              ? "Rất tốt! Cố lên chút nữa là hoàn hảo! 👍"
              : "Đừng buồn, luyện tập thêm là sẽ giỏi thôi! 💪";

        let html = `
          <div class="stats-title">📊 KẾT QUẢ BÀI HỌC</div>
          <div style="font-size:22px; font-weight:800; color:var(--text-color); margin-bottom:10px;">Đúng ${correctAnswers} / ${totalQuestions} câu (${percent}%)</div>
          <p style="color:#7f8c8d; font-weight:600; margin-bottom:20px;">${feedback}</p>
        `;

        if (mistakes.length > 0) {
          html += `<div style="text-align:left; background:#fff; padding:20px; border-radius:15px; border:2px dashed #f1c40f;">
            <strong style="font-size:18px; color:var(--danger-dark); display:block; margin-bottom:15px;">⚠️ Chú ý các từ này nhé:</strong>`;
          mistakes.forEach((err) => {
            let wrongDetail =
              err.wrongWord && mode === "quiz"
                ? `<br><span style="color:#7f8c8d; font-size:14px; padding-left:15px; display:inline-block;">(Nghĩa bạn chọn là của từ: <b>${err.wrongWord}</b> ${err.wrongIpa || ""})</span>`
                : "";
            html += `<div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
              <span style="font-weight:700;">${err.question}</span><br>
              <span style="color:var(--danger);">❌ Lựa chọn của bạn: "${err.userAnswer}"</span>${wrongDetail}<br>
              <span style="color:var(--success-dark); font-weight:700;">✅ Đáp án đúng: "${err.correct}"</span>
            </div>`;
          });
          html += `</div>`;
          html += `<button class="main-btn btn-spell" style="margin-top:20px; width:100%;" onclick="redoMistakes('${mode}')">🔄 Học lại các từ sai</button>`;
        }

        // NÂNG CẤP: Nút này giờ sẽ gọi hàm goBackToInput để mở lại ô nhập từ ban đầu
        html += `<button class="main-btn btn-quiz" style="margin-top:15px; width:100%;" onclick="goBackToInput()">Làm bài khác / Nhập từ mới</button>`;
        statsArea.innerHTML = html;
        statsArea.scrollIntoView({ behavior: "smooth" });
      }

      window.redoMistakes = (mode) => {
        document.getElementById("wordInput").value = mistakes
          .map((err) => err.word)
          .join("\n");
        startApp(mode);
      };
    </script>
  </body>
</html>
